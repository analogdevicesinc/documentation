  <text x="655" y="150" text-anchor="middle" fill="#d4a76a" font-size="12" font-weight="bold">DEV 1</text>
  <text x="625" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 5]</text>
  <text x="685" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 1]</text>
  <text x="625" y="200" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 6]</text>
  <text x="685" y="200" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 2]</text>

