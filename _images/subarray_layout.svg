<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Consolas, monospace" font-size="13">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="520" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">Antenna-Facing View (ADAR1000 ICs on reverse side)</text>

  <!-- Outer border -->
  <rect x="20" y="45" width="760" height="430" fill="none" stroke="#4a4a6a" stroke-width="2" rx="4"/>

  <!-- Horizontal divider -->
