  <text x="495" y="365" text-anchor="middle" fill="#d4a76a" font-size="12" font-weight="bold">DEV 4</text>
  <text x="465" y="390" text-anchor="middle" fill="#e0e0e0" font-size="12">[15]</text>
  <text x="525" y="390" text-anchor="middle" fill="#e0e0e0" font-size="12">[11]</text>
  <text x="465" y="415" text-anchor="middle" fill="#e0e0e0" font-size="12">[16]</text>
  <text x="525" y="415" text-anchor="middle" fill="#e0e0e0" font-size="12">[12]</text>

  <rect x="590" y="345" width="130" height="110" fill="#2a2a4a" stroke="#5a5a8a" rx="3"/>
  <text x="655" y="365" text-anchor="middle" fill="#d4a76a" font-size="12" font-weight="bold">DEV 2</text>
  <text x="625" y="390" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 7]</text>
  <text x="685" y="390" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 3]</text>
  <text x="625" y="415" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 8]</text>
  <text x="685" y="415" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 4]</text>

  <!-- Legend -->
  <text x="400" y="500" text-anchor="middle" fill="#888888" font-size="11">Element numbers shown in brackets [ ] — each device drives 4 antenna elements</text>
