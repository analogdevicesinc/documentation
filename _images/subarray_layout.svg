  <!-- Vertical divider -->
  <line x1="400" y1="45" x2="400" y2="475" stroke="#4a4a6a" stroke-width="2"/>

  <!-- SUBARRAY 4 (top-left) -->
  <text x="210" y="72" text-anchor="middle" fill="#6ecf6e" font-size="14" font-weight="bold">SUBARRAY 4</text>
  <text x="210" y="92" text-anchor="middle" fill="#aaaaaa" font-size="12">DAC0 / ADC2</text>
  <text x="210" y="112" text-anchor="middle" fill="#7ab8d4" font-size="11">TXRX1(p2) → J1A UDC</text>

  <!-- Sub4 devices -->
  <rect x="50" y="130" width="130" height="110" fill="#2a2a4a" stroke="#5a5a8a" rx="3"/>
  <text x="115" y="150" text-anchor="middle" fill="#d4a76a" font-size="12" font-weight="bold">DEV 7</text>
  <text x="85" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">[29]</text>
  <text x="145" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">[25]</text>
  <text x="85" y="200" text-anchor="middle" fill="#e0e0e0" font-size="12">[30]</text>
  <text x="145" y="200" text-anchor="middle" fill="#e0e0e0" font-size="12">[26]</text>

  <rect x="210" y="130" width="130" height="110" fill="#2a2a4a" stroke="#5a5a8a" rx="3"/>
  <text x="275" y="150" text-anchor="middle" fill="#d4a76a" font-size="12" font-weight="bold">DEV 5</text>
  <text x="245" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">[21]</text>
  <text x="305" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">[17]</text>
  <text x="245" y="200" text-anchor="middle" fill="#e0e0e0" font-size="12">[22]</text>
  <text x="305" y="200" text-anchor="middle" fill="#e0e0e0" font-size="12">[18]</text>

