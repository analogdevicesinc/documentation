  <text x="495" y="150" text-anchor="middle" fill="#d4a76a" font-size="12" font-weight="bold">DEV 3</text>
  <text x="465" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">[13]</text>
  <text x="525" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">[ 9]</text>
  <text x="465" y="200" text-anchor="middle" fill="#e0e0e0" font-size="12">[14]</text>
