  <text x="145" y="390" text-anchor="middle" fill="#e0e0e0" font-size="12">[27]</text>
  <text x="85" y="415" text-anchor="middle" fill="#e0e0e0" font-size="12">[32]</text>
  <text x="145" y="415" text-anchor="middle" fill="#e0e0e0" font-size="12">[28]</text>

  <rect x="210" y="345" width="130" height="110" fill="#2a2a4a" stroke="#5a5a8a" rx="3"/>
  <text x="275" y="365" text-anchor="middle" fill="#d4a76a" font-size="12" font-weight="bold">DEV 6</text>
  <text x="245" y="390" text-anchor="middle" fill="#e0e0e0" font-size="12">[23]</text>
  <text x="305" y="390" text-anchor="middle" fill="#e0e0e0" font-size="12">[19]</text>
  <text x="245" y="415" text-anchor="middle" fill="#e0e0e0" font-size="12">[24]</text>
  <text x="305" y="415" text-anchor="middle" fill="#e0e0e0" font-size="12">[20]</text>

  <!-- SUBARRAY 2 (bottom-right) -->
  <text x="590" y="287" text-anchor="middle" fill="#6ecf6e" font-size="14" font-weight="bold">SUBARRAY 2</text>
  <text x="590" y="307" text-anchor="middle" fill="#aaaaaa" font-size="12">DAC2 / ADC1</text>
  <text x="590" y="327" text-anchor="middle" fill="#7ab8d4" font-size="11">TXRX3(p6) → J1C UDC</text>

